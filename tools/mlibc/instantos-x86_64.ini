[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'

[host_machine]
system = 'instantos'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[built-in options]
c_args = ['--target=x86_64-unknown-elf', '-D_GNU_SOURCE', '-D__MLIBC_POSIX2024', '-ffreestanding', '-fno-stack-protector', '-fPIC']
cpp_args = ['--target=x86_64-unknown-elf', '-D_GNU_SOURCE', '-D__MLIBC_POSIX2024', '-ffreestanding', '-fno-stack-protector', '-fPIC', '-fno-exceptions', '-fno-rtti']
c_link_args = ['--target=x86_64-unknown-elf', '-nostdlib', '-fuse-ld=lld']
cpp_link_args = ['--target=x86_64-unknown-elf', '-nostdlib', '-fuse-ld=lld']
default_library = 'shared'
